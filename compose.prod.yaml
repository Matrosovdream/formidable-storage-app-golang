# Prod stack: built images, no source mount, healthchecks + restart policies,
# DB/Redis ports NOT exposed to the host.
#
# Usage:
#   docker compose -f compose.prod.yaml --env-file .env.prod up -d --build
#   docker compose -f compose.prod.yaml down

name: fsa-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./db/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}?sslmode=disable"
      - "up"
    restart: "no"

  web:
    build:
      context: .
      target: runtime
      args:
        BIN: web
    image: fsa/web:latest
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      target: runtime
      args:
        BIN: worker
    image: fsa/worker:latest
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }

volumes:
  pgdata:
  redisdata:
