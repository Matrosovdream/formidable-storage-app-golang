# Prod stack: built images, no source mount, healthchecks + restart policies,
# DB/Redis ports NOT exposed to the host. HTTP routing handled by Traefik
# (external `traefik-network` must already exist on the host).
#
# Usage:
#   docker compose -f compose.prod.yaml --env-file .env up -d --build
#   docker compose -f compose.prod.yaml down

name: fsa-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fsa-production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - fsa-production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./db/migrations:/migrations
    networks:
      - fsa-production
    command:
      - "-path=/migrations"
      - "-database=postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}?sslmode=disable"
      - "up"
    restart: "no"

  web:
    build:
      context: .
      target: runtime
      args:
        BIN: web
    image: fsa/web:latest
    restart: unless-stopped
    env_file: [.env]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    networks:
      - fsa-production
      - traefik-network
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.fsa-web.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.fsa-web.entrypoints=websecure"
      - "traefik.http.routers.fsa-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.fsa-web.loadbalancer.server.port=8080"
      - "traefik.http.services.fsa-web.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.fsa-web.loadbalancer.healthcheck.interval=30s"

  worker:
    build:
      context: .
      target: runtime
      args:
        BIN: worker
    image: fsa/worker:latest
    restart: unless-stopped
    env_file: [.env]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    networks:
      - fsa-production
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }

  # One-shot: `docker compose -f compose.prod.yaml --profile seed run --rm seed`
  seed:
    profiles: ["seed"]
    build:
      context: .
      target: runtime
      args:
        BIN: seed
    image: fsa/seed:latest
    env_file: [.env]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    networks:
      - fsa-production
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    restart: "no"

networks:
  fsa-production:
    driver: bridge
  traefik-network:
    external: true

volumes:
  pgdata:
  redisdata:
