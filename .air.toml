# Air config for hot-reload in the dev container.
# Reads $AIR_BIN to choose which cmd to build (web|worker).
# Per-bin tmp dir keeps web and worker from clobbering each other when they share the source bind-mount.

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/${AIR_BIN}/app ./cmd/${AIR_BIN}"
  bin = "./tmp/${AIR_BIN}/app"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", "project-reference", "project-plan", ".claude", "test"]
  delay = 300
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[misc]
  clean_on_exit = true
